<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#004ac6" />
    <meta name="description" content="SmartFlow – AI-Powered Sewage Intelligence for Smart Cities" />
    <title>SmartFlow – GHMC Smart Sewage Monitor</title>
    <!-- Tailwind CSS (CDN for CRA compatibility) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script id="tw-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface":                  "#f9f9f9",
              "surface-container-low":    "#f3f3f3",
              "surface-container":        "#eeeeee",
              "surface-container-high":   "#e8e8e8",
              "surface-container-highest":"#e2e2e2",
              "surface-container-lowest": "#ffffff",
              "surface-variant":          "#e2e2e2",
              "surface-dim":              "#dadada",
              "surface-bright":           "#f9f9f9",
              "background":               "#f9f9f9",
              "on-background":            "#1a1c1c",
              "on-surface":               "#1a1c1c",
              "on-surface-variant":       "#434655",
              "outline":                  "#737686",
              "outline-variant":          "#c3c6d7",
              "primary":                  "#004ac6",
              "on-primary":               "#ffffff",
              "primary-container":        "#2563eb",
              "on-primary-container":     "#eeefff",
              "primary-fixed":            "#dbe1ff",
              "primary-fixed-dim":        "#b4c5ff",
              "inverse-primary":          "#b4c5ff",
              "secondary":                "#006780",
              "on-secondary":             "#ffffff",
              "secondary-container":      "#76dcff",
              "on-secondary-container":   "#006077",
              "tertiary":                 "#6a1edb",
              "on-tertiary":              "#ffffff",
              "tertiary-container":       "#8343f4",
              "on-tertiary-container":    "#f7edff",
              "error":                    "#ba1a1a",
              "on-error":                 "#ffffff",
              "error-container":          "#ffdad6",
              "on-error-container":       "#93000a",
              "inverse-surface":          "#2f3131",
              "inverse-on-surface":       "#f0f1f1",
              "surface-tint":             "#0053db",
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body":     ["Inter", "sans-serif"],
              "label":    ["JetBrains Mono", "monospace"],
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              sm:      "0.125rem",
              md:      "0.25rem",
              lg:      "0.375rem",
              xl:      "0.5rem",
              "2xl":   "0.75rem",
              "3xl":   "1rem",
              full:    "9999px",
            },
          },
        },
      };
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
        line-height: 1;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e2e2; border-radius: 10px; }
      @keyframes map-pulse {
        0% { transform: scale(1); opacity: 0.6; }
        100% { transform: scale(2.5); opacity: 0; }
      }
      .map-pulse::after {
        content: ''; position: absolute; width: 100%; height: 100%;
        top: 0; left: 0; background: inherit; border-radius: 50%;
        opacity: 0.6; animation: map-pulse 2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
      }
      @keyframes sfSpin { to { transform: rotate(360deg); } }
      @keyframes sfPulse {
        0%,100% { transform: scale(1); opacity: .3; }
        50%      { transform: scale(1.6); opacity: 0; }
      }
      input[type=range] { accent-color: #004ac6; }
    </style>
  </head>
  <body class="bg-background text-on-background font-body antialiased">
    <div id="root"></div>
  </body>
</html>
